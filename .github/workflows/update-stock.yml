name: Update stock from Yandex Mail

on:
  schedule:
    # Основная проверка вскоре после полуночи по времени Стерлитамака (UTC+5).
    - cron: "37 1 * * *"
      timezone: "Asia/Yekaterinburg"
    # Резервная проверка на случай позднего письма поставщика или задержки
    # планировщика GitHub. Скрипт идемпотентен: если файл уже обновлён,
    # повторный запуск завершается без commit и push.
    - cron: "7 3 * * *"
      timezone: "Asia/Yekaterinburg"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: update-stock-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  update-stock:
    name: Check mail and update stock
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out the default branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
          # The repository contains thousands of large product images. The
          # scheduled job only needs its own code and the single stock workbook.
          sparse-checkout: |
            /.github/
            /scripts/
            /requirements-stock.txt
            /stock-data/stock.xlsx
          sparse-checkout-cone-mode: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-stock.txt

      - name: Install XLSX validation dependencies
        run: python -m pip install --disable-pip-version-check -r requirements-stock.txt

      - name: Download and validate the latest stock workbook
        id: stock
        env:
          YANDEX_EMAIL: ${{ secrets.YANDEX_EMAIL }}
          YANDEX_APP_PASSWORD: ${{ secrets.YANDEX_APP_PASSWORD }}
          STOCK_SENDER_EMAIL: ${{ secrets.STOCK_SENDER_EMAIL }}
          STOCK_MAX_EMAIL_AGE_HOURS: "72"
        run: python scripts/update_stock_from_yandex.py

      - name: Commit and push a changed stock workbook
        id: commit
        if: steps.stock.outputs.changed == 'true'
        shell: bash
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- stock-data/stock.xlsx

          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            echo "stock.xlsx has no staged changes; commit is not needed."
            exit 0
          fi

          git commit -m "chore(stock): automatic stock update $(date -u +%F)"
          git fetch --no-tags origin "${TARGET_BRANCH}"
          if ! git rebase FETCH_HEAD; then
            echo "::error::The default branch changed and stock.xlsx could not be rebased safely."
            git rebase --abort || true
            exit 1
          fi
          git push origin "HEAD:${TARGET_BRANCH}"
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # A push made with GITHUB_TOKEN does not start the built-in Pages build.
      # Request it explicitly after (and only after) a successful stock push.
      - name: Request GitHub Pages rebuild
        if: steps.commit.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds" --silent
          echo "GitHub Pages rebuild requested."
